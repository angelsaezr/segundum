<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:head>
	<meta charset="utf-8" />
	<title><ui:insert name="title" /></title>
	<h:outputStylesheet name="assets/css/main.css" />
</h:head>

<h:body class="homepage is-preload">

	<ui:insert name="metadata" />

	<div id="page-wrapper">
		<section id="header">
			<h1>
				<a href="#{request.contextPath}/index.xhtml">SEGUNDUM</a>
			</h1>
			<!-- Nav -->
			<nav id="nav">
				<ul>
					<li class="#{estilo1}"><a
						href="#{request.contextPath}/index.xhtml">Inicio</a></li>

					<ui:fragment rendered="#{sessionScope['usuarioLogueado'] == null}">
						<li class="#{estilo2}"><a
							href="#{request.contextPath}/segundum/login.xhtml">Iniciar
								sesión</a></li>
					</ui:fragment>

					<ui:fragment rendered="#{sessionScope['usuarioLogueado'] != null}">
						<li><h:form style="margin:0;">
								<h:commandLink value="Cerrar sesión"
									action="#{loginUsuarioWeb.logout}"
									style="color:#ff4b4b; font-weight:bold;" />
							</h:form></li>
					</ui:fragment>


				</ul>


			</nav>
		</section>
		<section id="main">
			<div class="container">
				<ui:insert name="content" />
			</div>
		</section>
		<ui:include src="/WEB-INF/template/footer.xhtml" />
	</div>

	<h:outputScript name="assets/js/jquery.dropotron.min.js" />
	<h:outputScript name="assets/js/browser.min.js" />
	<h:outputScript name="assets/js/breakpoints.min.js" />
	<h:outputScript name="assets/js/util.js" />
	<h:outputScript name="assets/js/main.js" />
</h:body>
</html>
