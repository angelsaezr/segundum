<ui:composition template="/WEB-INF/template/template.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:p="http://primefaces.org/ui"
	xmlns:f="http://xmlns.jcp.org/jsf/core">

	<ui:define name="title">
		Login
	</ui:define>

	<ui:param name="estilo2" value="current" />

	<ui:define name="content">

		<div style="width: 400px; margin: 100px auto;">

			<h:form>

				<p:messages id="msgs" showDetail="true" closable="true"
					autoUpdate="true" />

				<h:panelGrid columns="2">

					<p:outputLabel value="Email:" for="email" />
					<p:inputText id="email" value="#{loginUsuarioBean.email}"
						required="true" placeholder="Correo electrónico" />

					<p:outputLabel value="Contraseña:" for="clave" />
					<p:password id="clave" value="#{loginUsuarioBean.clave}"
						required="true" feedback="false" placeholder="Contraseña" />

				</h:panelGrid>

				<br />

				<h:messages />
				<p:commandButton value="Entrar" icon="pi pi-sign-in"
					action="#{loginUsuarioBean.login}" ajax="false" />

			</h:form>
		</div>

	</ui:define>
</ui:composition>
