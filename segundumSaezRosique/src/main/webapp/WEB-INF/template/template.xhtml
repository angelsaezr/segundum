<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

<h:head>
	<meta charset="utf-8" />
	<title><ui:insert name="title" /></title>
	<h:outputStylesheet name="assets/css/main.css" />
</h:head>

<h:body class="homepage is-preload">

	<ui:insert name="metadata" />

	<div id="page-wrapper">
		<section id="header">
			<h1>
				<a href="#{request.contextPath}/index.xhtml">SEGUNDUM</a>
			</h1>

			<!-- Nav -->
			<nav id="nav">
				<ul>

					<!-- Botón Home -->
					<li class="#{estilo1}"><p:button value="Inicio"
							href="#{request.contextPath}/index.xhtml" icon="pi pi-home"
							styleClass="ui-button-raised ui-button-rounded ui-button-secondary" />
					</li>

					<!-- Botón iniciar sesión -->
					<ui:fragment rendered="#{sessionScope['usuarioLogueado'] == null}">
						<li class="#{estilo2}"><p:button value="Iniciar sesión"
								icon="pi pi-sign-in"
								href="#{request.contextPath}/segundum/login.xhtml"
								styleClass="ui-button-raised ui-button-rounded ui-button-primary" />
						</li>
					</ui:fragment>

					<ui:fragment rendered="#{sessionScope['usuarioLogueado'] != null}">
						<li><p:button value="Crear producto"
								icon="pi pi-plus-circle"
								href="#{request.contextPath}/segundum/crearProducto.xhtml"
								styleClass="ui-button-raised ui-button-rounded ui-button-primary" />
						</li>

						<ui:fragment rendered="#{sessionScope['usuarioLogueado'] != null}">
							<li><p:button value="Mis productos" icon="pi pi-list"
									href="#{request.contextPath}/segundum/misProductos.xhtml"
									styleClass="ui-button-raised ui-button-rounded ui-button-primary" /></li>
						</ui:fragment>
						
						<ui:fragment rendered="#{sessionScope['usuarioLogueado'] != null}">
							<li><p:button value="Buscar productos" icon="pi pi-search"
									href="#{request.contextPath}/segundum/buscarProducto.xhtml"
									styleClass="ui-button-raised ui-button-rounded ui-button-primary" /></li>
						</ui:fragment>


						<!-- Botón cerrar sesión -->
						<ui:fragment rendered="#{sessionScope['usuarioLogueado'] != null}">
							<li class="#{estilo2}"><h:form>
									<p:commandButton value="Cerrar sesión"
										action="#{loginUsuarioWeb.logout}" icon="pi pi-sign-out"
										ajax="false" update="@none"
										styleClass="ui-button-raised ui-button-rounded ui-button-danger" />
								</h:form></li>
						</ui:fragment>

					</ui:fragment>

				</ul>
			</nav>
		</section>

		<section id="main">
			<div class="container">
				<ui:insert name="content" />
			</div>
		</section>

		<ui:include src="/WEB-INF/template/footer.xhtml" />
	</div>

	<h:outputScript name="assets/js/jquery.dropotron.min.js" />
	<h:outputScript name="assets/js/browser.min.js" />
	<h:outputScript name="assets/js/breakpoints.min.js" />
	<h:outputScript name="assets/js/util.js" />
	<h:outputScript name="assets/js/main.js" />
</h:body>
</html>
