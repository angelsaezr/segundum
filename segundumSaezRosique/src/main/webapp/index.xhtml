<ui:composition template="/WEB-INF/template/template.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:p="http://primefaces.org/ui">

	<ui:define name="title">Inicio</ui:define>
	<ui:param name="estilo1" value="current" />

	<ui:define name="content">

		<!-- Si no esta logueado -->
		<ui:fragment rendered="#{sessionScope['usuarioLogueado'] == null}">
			<section id="banner">
				<header>
					<h1>Bienvenido a Segundum</h1>
					<p>Inicia sesión para continuar</p>
					<p:button value="Iniciar sesión" icon="pi pi-sign-in"
							  href="#{request.contextPath}/segundum/login.xhtml"
							  styleClass="ui-button-primary ui-button-rounded ui-button-raised" />
				</header>
			</section>
		</ui:fragment>

		<!-- Si esta logueado -->
		<ui:fragment rendered="#{sessionScope['usuarioLogueado'] != null}">
			<section id="banner">
				<header>
					<h1>Hola #{sessionScope['usuarioLogueado'].nombre}</h1>
					<p>Ya puedes usar Segundum</p>
				</header>
			</section>
		</ui:fragment>

	</ui:define>
</ui:composition>
